# Netlify build configuration for the Trigger Warnings Book Club site.

[build]
  command = "npm run build"   # runs prebuild (fetch-feed) then vite build
  publish = "dist"            # Vite's build output folder

[build.environment]
  NODE_VERSION = "20"

# --- WROMANCEL proxy -------------------------------------------------------
# The romance-guessing game is a separate Node+Postgres app hosted on Railway.
# These rules proxy /wromancel (and everything under it) to that app while the
# URL bar keeps showing triggerwarningsbookclub.com/wromancel. status=200 makes
# it a true proxy (a rewrite), not a redirect. force=true ensures these win
# over the SPA catch-all below.
#
# IMPORTANT: these MUST come before the /* SPA fallback. Netlify evaluates
# redirects top-to-bottom and uses the first match.
[[redirects]]
  from = "/wromancel"
  to = "https://wromacel-v2-production.up.railway.app/daily.html"
  status = 200
  force = true

[[redirects]]
  from = "/wromancel/*"
  to = "https://wromacel-v2-production.up.railway.app/:splat"
  status = 200
  force = true

# SPA fallback: serve index.html for client-side routes (/episodes, /about, …)
# so a refresh or direct link doesn't 404. (public/_redirects does the same;
# this is a belt-and-suspenders duplicate that lives with the build config.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
