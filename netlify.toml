# Netlify build configuration for the Trigger Warnings Book Club site.

[build]
  command = "npm run build"   # runs prebuild (fetch-feed) then vite build
  publish = "dist"            # Vite's build output folder

[build.environment]
  NODE_VERSION = "20"

# --- WROMANCEL proxy -------------------------------------------------------
# Proxy /wromancel to the Railway game app. status=200 = true rewrite (URL bar
# keeps showing triggerwarningsbookclub.com/wromancel); force=true = wins over
# the SPA catch-all. NO self-redirect (a /wromancel -> /wromancel/ hop caused a
# redirect loop). The game page detects its prefix at runtime and uses absolute
# API paths, so no trailing-slash normalization is needed. Order matters — these
# MUST precede the /* fallback.
[[redirects]]
  from = "/wromancel"
  to = "https://wromacel-v2-production.up.railway.app/daily.html"
  status = 200
  force = true

[[redirects]]
  from = "/wromancel/*"
  to = "https://wromacel-v2-production.up.railway.app/:splat"
  status = 200
  force = true

# SPA fallback: serve index.html for client-side routes (/episodes, /about, …).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
